name: Build and Release APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'beta'
        type: choice
        options:
          - alpha
          - beta
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create .env file with API Key
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore upload-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Hunter App, OU=Development, O=Hunter, L=Cairo, ST=Cairo, C=EG"
        
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true
      
      - name: Build Debug APK (Fallback)
        if: failure()
        run: ./gradlew assembleDebug --stacktrace
        
      - name: List APK outputs
        run: |
          echo "=== Release APKs ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; || echo "No release APKs found"
          echo "=== Debug APKs ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; || echo "No debug APKs found"
      
      - name: Upload Release APK Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hunter-release-apk
          path: app/build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Upload Debug APK Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hunter-debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Create Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "# Hunter App Release" > release_notes.md
          echo "Version: ${{ github.ref_name }}" >> release_notes.md
          echo "Build Date: $(date)" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Changes" >> release_notes.md
          git log --oneline $(git describe --tags --abbrev=0 @^)..@ >> release_notes.md || echo "First release" >> release_notes.md
      
      - name: Upload Release to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/**/*.apk
          draft: false
          prerelease: false
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify Success
        if: success()
        run: |
          echo "✅ APK Build Completed Successfully!"
          echo "Download your APK from the Artifacts section"
      
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ APK Build Failed"
          echo "Check the logs above for details"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Unit Tests
        run: ./gradlew test
        continue-on-error: true
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Lint
        run: ./gradlew lint
        continue-on-error: true
      
      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7
