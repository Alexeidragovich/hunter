name: Generate Keystore and Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  setup-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
          
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore upload-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.STORE_PASSWORD }}" \
            -dname "CN=Hunter App, OU=Development, O=Hunter, L=Cairo, ST=Cairo, C=EG"
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hunter-release-apk
          path: app/build/outputs/apk/release/
          retention-days: 30
          
      - name: Build Debug APK (Fallback)
        if: failure()
        run: ./gradlew assembleDebug
        
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: hunter-debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 30
          
      - name: Display APK Info
        if: success()
        run: |
          echo "✅ APK built successfully!"
          ls -lh app/build/outputs/apk/release/
